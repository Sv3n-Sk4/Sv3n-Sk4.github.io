<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sv3n-Sk4 — Projects Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0a0a0a;
    color: #fafafa;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .shell {
    max-width: 720px;
    margin: 0 auto;
    padding: 96px 24px 64px;
  }
  .eyebrow {
    color: #6366f1;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 44px;
    font-weight: 900;
    letter-spacing: 6px;
    margin-bottom: 32px;
  }
  p {
    color: #9ca3af;
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .projects {
    margin-top: 56px;
    display: grid;
    gap: 16px;
  }
  .project {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    padding: 20px 24px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s, background 0.15s;
  }
  .project:hover {
    border-color: #6366f1;
    background: #1a1a1a;
  }
  .project-name {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 2px;
    color: #fafafa;
  }
  .project-desc {
    color: #6b7280;
    font-size: 13px;
    margin-top: 4px;
  }
  .project-links {
    margin-top: 12px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .project-link {
    color: #6366f1;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  footer {
    color: #6b7280;
    font-size: 12px;
    letter-spacing: 4px;
    text-align: center;
    margin-top: 96px;
  }
</style>
</head>
<body>
<div class="shell">
  <div class="eyebrow">PUBLIC DOCS HUB</div>
  <h1>SV3N-SK4</h1>
  <p>
    Hosting page for legal &amp; support documents of mobile and web apps
    by <a href="https://github.com/Sv3n-Sk4" style="color:#6366f1;">@Sv3n-Sk4</a>.
  </p>

  <div class="projects">
    <a href="reframd/privacy-policy.html" class="project">
      <div class="project-name">REFRAMD</div>
      <div class="project-desc">Rive Animation Discovery · iOS / Android</div>
      <div class="project-links">
        <span class="project-link">→ Privacy Policy</span>
      </div>
    </a>
  </div>

  <footer>DE.H.VS</footer>
</div>
</body>
</html>
